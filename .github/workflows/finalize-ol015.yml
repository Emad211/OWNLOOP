name: Finalize OL-015 Evidence Graph

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-015-evidence-graph'
    runs-on: ubuntu-latest
    steps:
      - name: Check out OL-015 branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Verify and decode implementation patch
        shell: bash
        run: |
          set -euo pipefail
          expected_sizes=(8000 8000 8000 8000 8000 3628)
          expected_hashes=(
            193a9d3ebc887ba409ce07cba9fbcb0cd394572ad008981a74ea8e6e4623e261
            03b2cab8b247f3ecece193ea086484583f2a2ea604a818447674c1a04b6307cd
            45aef9790480551a71f3d4d746de21bd3a3e522645ede473b923e6da63a25ef2
            9d55cc635255e69cb46fdac55b8fbf663ee70a56d6d81511accd177f9a56805b
            c790a389470b40d13d662993be6cdc8ba59bed4210b0aa6d9283a7f09c928186
            b98490434519b03bf84f4be47d81c4efc6fd1f9d9a238d0d33a9d3a1f21ef5fe
          )
          for index in $(seq 0 5); do
            suffix=$(printf '%02d' "$index")
            path=".github/ol015-payload/part-${suffix}"
            test "$(wc -c < "$path")" -eq "${expected_sizes[$index]}"
            echo "${expected_hashes[$index]}  $path" | sha256sum --check
          done
          cat .github/ol015-payload/part-* > /tmp/ol015.patch.gz.b64
          test "$(wc -c < /tmp/ol015.patch.gz.b64)" -eq 43628
          base64 --decode /tmp/ol015.patch.gz.b64 > /tmp/ol015.patch.gz
          test "$(wc -c < /tmp/ol015.patch.gz)" -eq 32719
          echo "c23e74431e5acbe38c3434bdf5dcec48594777817892abbace92c1125d943997  /tmp/ol015.patch.gz" | sha256sum --check
          gzip --test /tmp/ol015.patch.gz
          gzip --decompress --stdout /tmp/ol015.patch.gz > /tmp/ol015.patch
          test "$(wc -c < /tmp/ol015.patch)" -eq 155310
          echo "a5627c9417446514d29e9eba539ef5b453d0c0cc2492aa904d3e0cb1f3ff5fae  /tmp/ol015.patch" | sha256sum --check
          git apply --check /tmp/ol015.patch

      - name: Apply patch and verify exact scope
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/ol015.patch
          git add -N .
          cat > /tmp/expected-files <<'FILES'
          .github/workflows/export-ol015-source.yml
          AGENTS.md
          README.md
          apps/daemon/src/evidence-graph/README.md
          apps/daemon/src/evidence-graph/artifact.ts
          apps/daemon/src/evidence-graph/builder.test.ts
          apps/daemon/src/evidence-graph/builder.ts
          apps/daemon/src/evidence-graph/constants.ts
          apps/daemon/src/evidence-graph/index.ts
          apps/daemon/src/evidence-graph/processor.test.ts
          apps/daemon/src/evidence-graph/processor.ts
          apps/daemon/src/index.ts
          apps/daemon/src/persistence/migration-definitions.ts
          apps/daemon/src/persistence/migrations.test.ts
          apps/daemon/src/replay/constants.ts
          apps/daemon/src/replay/projection.ts
          apps/daemon/src/replay/responses.ts
          apps/daemon/src/replay/routes.ts
          apps/web/src/App.test.tsx
          apps/web/src/App.tsx
          apps/web/src/api.test.ts
          apps/web/src/api.ts
          apps/web/src/styles.css
          docs/adr/0017-deterministic-locally-resolvable-evidence-graph.md
          packages/contracts/src/evidence-graph.ts
          packages/contracts/src/index.ts
          packages/contracts/src/replay.ts
          packages/contracts/tests/evidence-graph.test.ts
          FILES
          {
            git diff --name-only
            git diff --cached --name-only
          } \
            | grep -v '^\.github/ol015-payload/' \
            | grep -v '^\.github/workflows/finalize-ol015.yml$' \
            | sort -u > /tmp/actual-files
          diff -u /tmp/expected-files /tmp/actual-files
          git rm -r .github/ol015-payload
          git rm .github/workflows/export-ol015-source.yml
          git rm .github/workflows/finalize-ol015.yml
          git diff --check

      - name: Set up exact Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Install frozen dependencies
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile

      - name: Validate OL-015 implementation
        shell: bash
        run: |
          set -euo pipefail
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish clean OL-015 commit
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement deterministic evidence graph"
          git push origin "HEAD:${{ github.head_ref }}"
