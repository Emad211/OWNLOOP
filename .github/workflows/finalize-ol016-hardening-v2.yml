name: Finalize OL-016 Hardening v2

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-016-candidate-moment-contracts'
    runs-on: ubuntu-latest
    steps:
      - name: Check out OL-016 branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Verify and apply hardening patch
        shell: bash
        run: |
          set -euo pipefail
          payload=.github/ol016-hardening/payload.b64
          test "$(wc -c < "$payload")" -eq 2168
          base64 --decode "$payload" > /tmp/ol016-hardening.patch.gz
          test "$(wc -c < /tmp/ol016-hardening.patch.gz)" -eq 1625
          echo "750e48c147b5cd00ba97e729da0893ed331041edecef87b1d9c987a19441ecbd  /tmp/ol016-hardening.patch.gz" | sha256sum --check
          gzip --test /tmp/ol016-hardening.patch.gz
          gzip --decompress --stdout /tmp/ol016-hardening.patch.gz > /tmp/ol016-hardening.patch
          test "$(wc -c < /tmp/ol016-hardening.patch)" -eq 4372
          echo "6d8760258437fc370cef4d8abec405e47945e9b1bf0ba9a9edaeebac31603b47  /tmp/ol016-hardening.patch" | sha256sum --check
          git apply --check /tmp/ol016-hardening.patch
          git apply /tmp/ol016-hardening.patch
          echo "4a081a15886972bf75939a598453f43b6cbb887c14734e7ac7683ce91b4b84ab  packages/contracts/src/candidate-moment.ts" | sha256sum --check
          echo "2d265f29a226cab1fd8da64e451e3e128bca49d9d7f2a21ab6cf74c415653188  packages/contracts/tests/candidate-moment-hardening.test.ts" | sha256sum --check

      - name: Verify exact scope and remove transfer files
        shell: bash
        run: |
          set -euo pipefail
          git rm .github/ol016-hardening/payload.b64
          git rm .github/workflows/export-ol016-source.yml
          git rm .github/workflows/finalize-ol016-hardening.yml
          git rm .github/workflows/finalize-ol016-hardening-v2.yml
          cat > /tmp/expected-files <<'FILES'
          .github/ol016-hardening/payload.b64
          .github/workflows/export-ol016-source.yml
          .github/workflows/finalize-ol016-hardening-v2.yml
          .github/workflows/finalize-ol016-hardening.yml
          packages/contracts/src/candidate-moment.ts
          packages/contracts/tests/candidate-moment-hardening.test.ts
          FILES
          { git diff --name-only; git diff --cached --name-only; } | sort -u > /tmp/actual-files
          diff -u /tmp/expected-files /tmp/actual-files
          git diff --check

      - name: Set up exact Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0

      - name: Set up exact pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate complete repository
        run: |
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish clean OL-016 hardening
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Harden candidate moment plain-text validation"
          git push origin "HEAD:${{ github.head_ref }}"
