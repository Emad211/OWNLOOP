name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        id: formatting
        continue-on-error: true
        run: pnpm format:check

      - name: Capture formatter diff
        if: steps.formatting.outcome == 'failure'
        run: |
          pnpm format
          git diff --binary > format.diff

      - name: Upload formatter diff
        if: steps.formatting.outcome == 'failure'
        uses: actions/upload-artifact@v6
        with:
          name: formatter-diff
          path: format.diff
          if-no-files-found: error

      - name: Fail on formatter drift
        if: steps.formatting.outcome == 'failure'
        run: exit 1

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
