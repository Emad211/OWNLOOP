name: Apply OL-003 Implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Verify chunks
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected <<'HASHES'
          55f210181014f05b0af242acc9b775bc4250a529 .github/ol003-parts/part-00
          01f4b2b8f44db3c484709b3b9397983abd632de7 .github/ol003-parts/part-01
          8ca8cfbf5e63aa8f2a8da860ab48a7ad18f3311d .github/ol003-parts/part-02
          eef354fbf8a5ba7c96910c95debf3d407dadacf8 .github/ol003-parts/part-03
          HASHES
          while read -r expected file; do
            test -s "$file"
            test "$(git hash-object "$file")" = "$expected"
          done < /tmp/expected

      - name: Assemble and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/ol003-parts/part-* > /tmp/ol003.diff.gz.b64
          test "$(wc -c < /tmp/ol003.diff.gz.b64)" -eq 15924
          base64 --decode /tmp/ol003.diff.gz.b64 > /tmp/ol003.diff.gz
          gzip --test /tmp/ol003.diff.gz
          gzip --decompress --stdout /tmp/ol003.diff.gz > /tmp/ol003.diff
          echo "e7ca71a45b45f5545d5d742ddbe9ce4bec5ba2c3ad4dfdfe4989f03fc3b008b4  /tmp/ol003.diff" | sha256sum --check
          git apply --check --verbose /tmp/ol003.diff

      - name: Apply and publish
        shell: bash
        run: |
          set -euo pipefail
          git apply --index /tmp/ol003.diff
          git rm -r .github/ol003-parts
          git rm .github/workflows/apply-ol003-implementation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement OL-003 loopback ingestion"
          git push origin "HEAD:${{ github.head_ref }}"
