name: Export OL-011A Source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-011a-finalization-hardening'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Build exact source archive
        shell: bash
        run: |
          set -euo pipefail
          tar --exclude='.git' --exclude='.github/ol011a-hardening' --exclude='.github/ol011a-hardening-gz' -czf /tmp/ownloop-ol011a-source.tar.gz .
          sha256sum /tmp/ownloop-ol011a-source.tar.gz > /tmp/ownloop-ol011a-source.sha256

      - name: Upload source
        uses: actions/upload-artifact@v6
        with:
          name: ownloop-ol011a-source
          path: |
            /tmp/ownloop-ol011a-source.tar.gz
            /tmp/ownloop-ol011a-source.sha256
          compression-level: 0
          retention-days: 1
