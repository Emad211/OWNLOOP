name: Apply OL-005A Patch

on:
  pull_request:
    branches:
      - agent/ol-005a-ingress-security-plan

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Decode implementation patch
        shell: bash
        run: |
          set -euo pipefail
          patch_file=.github/ol005a-code.patch.gz.b64
          test -s "$patch_file"
          base64 --decode "$patch_file" > /tmp/ol005a-code.patch.gz
          gzip --test /tmp/ol005a-code.patch.gz
          gzip --decompress --stdout /tmp/ol005a-code.patch.gz > /tmp/ol005a-code.patch
          test -s /tmp/ol005a-code.patch
          sha256sum /tmp/ol005a-code.patch

      - name: Verify implementation patch
        shell: bash
        run: git apply --check --verbose /tmp/ol005a-code.patch

      - name: Apply and publish implementation
        shell: bash
        run: |
          set -euo pipefail
          git apply --index /tmp/ol005a-code.patch
          git rm .github/ol005a-code.patch.gz.b64
          git rm .github/workflows/source-snapshot.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement OL-005A ingress security"
          git push origin "HEAD:${{ github.head_ref }}"
