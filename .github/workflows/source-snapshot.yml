name: Apply OL-005A Patch

on:
  pull_request:
    branches:
      - agent/ol-005a-ingress-security-plan

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Apply verified implementation patch
        shell: bash
        run: |
          set -euo pipefail
          patch_file=.github/ol005a-code.patch.gz.b64
          if [[ ! -f "$patch_file" ]]; then
            echo "Patch payload not present yet; nothing to apply."
            exit 0
          fi

          base64 --decode "$patch_file" | gzip --decompress > /tmp/ol005a-code.patch
          echo "cd91a0a3d8d04077a2ba2ab19c3e8f3a4d9a32a82a4d1bb245ba4889377918b8  /tmp/ol005a-code.patch" | sha256sum --check
          git apply --check /tmp/ol005a-code.patch
          git apply --index /tmp/ol005a-code.patch
          git rm "$patch_file"
          git rm .github/workflows/source-snapshot.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement OL-005A ingress security"
          git push origin "HEAD:${{ github.head_ref }}"
