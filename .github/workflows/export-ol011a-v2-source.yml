name: Finalize OL-011A v2 Hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-011a-finalization-hardening-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Check out hardening branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Assemble and verify validated patch
        shell: bash
        run: |
          set -euo pipefail
          payload=.github/ol011a-v2/patch.gz.b64
          test "$(wc -c < "$payload")" -eq 10776
          base64 --decode "$payload" > /tmp/ol011a-v2.patch.gz
          test "$(wc -c < /tmp/ol011a-v2.patch.gz)" -eq 8082
          echo "b5c1fbbdd9a8984ed29322c4b47fa3a1a97cc0d6db2755ef944861c65c33f240  /tmp/ol011a-v2.patch.gz" | sha256sum --check
          gzip --test /tmp/ol011a-v2.patch.gz
          gzip --decompress --stdout /tmp/ol011a-v2.patch.gz > /tmp/ol011a-v2.patch
          test "$(wc -c < /tmp/ol011a-v2.patch)" -eq 34281
          echo "dfa51505a5c5dd629e513c18728c6190e4693733045905ed351d3d95d9e5267e  /tmp/ol011a-v2.patch" | sha256sum --check
          git apply --check /tmp/ol011a-v2.patch

      - name: Apply patch and verify exact scope
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/ol011a-v2.patch
          cat > /tmp/expected-production-files <<'FILES'
          apps/daemon/src/finalization/README.md
          apps/daemon/src/finalization/processor.test.ts
          apps/daemon/src/finalization/processor.ts
          apps/daemon/src/persistence/migration-definitions.ts
          apps/daemon/src/persistence/migrations.test.ts
          apps/daemon/src/persistence/repositories/run-finalizations.ts
          docs/adr/0013-deterministic-run-finalization-and-crash-recovery.md
          FILES
          git diff --name-only | grep -v '^\.github/' | sort > /tmp/actual-production-files
          diff -u /tmp/expected-production-files /tmp/actual-production-files
          git rm -r .github/ol011a-v2
          git rm .github/workflows/export-ol011a-v2-source.yml
          git diff --check

      - name: Set up exact Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Install frozen dependencies
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile

      - name: Validate hardened implementation
        shell: bash
        run: |
          set -euo pipefail
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish clean hardening commit
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Complete OL-011A finalization hardening"
          git push origin "HEAD:${{ github.head_ref }}"
