name: Apply OL-008 Implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Assemble payload
        shell: bash
        run: |
          set -euo pipefail
          for index in $(seq -w 0 12); do
            test -s ".github/ol008-parts/part-${index}"
          done
          cat .github/ol008-parts/part-* > /tmp/ol008.diff.gz.b64
          test "$(wc -c < /tmp/ol008.diff.gz.b64)" -eq 26416

      - name: Verify encoded payload
        shell: bash
        run: |
          set -euo pipefail
          echo "6d3a73fb92654888d6a2d0384bdf047be6fcebb4bd2871f72f5fec30fc9184a4  /tmp/ol008.diff.gz.b64" | sha256sum --check

      - name: Decode and verify patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode /tmp/ol008.diff.gz.b64 > /tmp/ol008.diff.gz
          gzip --test /tmp/ol008.diff.gz
          gzip --decompress --stdout /tmp/ol008.diff.gz > /tmp/ol008.diff
          echo "b648e7349e17b01cc7ec414c4371c1ce3c52287634203025a49d722d5f0a14ed  /tmp/ol008.diff" | sha256sum --check
          git apply --check --verbose /tmp/ol008.diff

      - name: Apply and publish
        shell: bash
        run: |
          set -euo pipefail
          git apply --index /tmp/ol008.diff
          git rm -r .github/ol008-parts
          git rm .github/workflows/apply-ol008-implementation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement OL-008 Git baseline capture"
          git push origin "HEAD:${{ github.head_ref }}"
