name: Export OL-016 Source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-016-candidate-moment-contracts'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format exact source
        run: pnpm format

      - name: Capture focused candidate tests
        shell: bash
        run: |
          set +e
          pnpm exec vitest run \
            packages/contracts/tests/candidate-moment.test.ts \
            packages/contracts/tests/candidate-moment-hardening.test.ts \
            packages/contracts/tests/index.test.ts \
            --reporter=verbose \
            > /tmp/ownloop-ol016-focused-tests.log 2>&1
          status=$?
          printf '%s\n' "$status" > /tmp/ownloop-ol016-focused-tests.status
          exit 0

      - name: Build formatted source archive
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude='*/node_modules' \
            --exclude=dist \
            --exclude='*/dist' \
            --exclude=.turbo \
            --exclude='*/.turbo' \
            -czf /tmp/ownloop-ol016-formatted-source.tar.gz .
          sha256sum /tmp/ownloop-ol016-formatted-source.tar.gz > /tmp/ownloop-ol016-formatted-source.sha256

      - name: Upload formatted source and focused test log
        uses: actions/upload-artifact@v6
        with:
          name: ownloop-ol016-diagnostics
          path: |
            /tmp/ownloop-ol016-formatted-source.tar.gz
            /tmp/ownloop-ol016-formatted-source.sha256
            /tmp/ownloop-ol016-focused-tests.log
            /tmp/ownloop-ol016-focused-tests.status
          if-no-files-found: error
          retention-days: 1
