name: Prepare OL-009 Toolchain

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24.18.0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture exact Node binary
        run: cp "$(command -v node)" /tmp/node-24.18.0

      - name: Create source and toolchain archive
        run: tar --exclude=.git -czf /tmp/ownloop-ol009-toolchain.tar.gz . -C /tmp node-24.18.0

      - name: Upload source and toolchain archive
        uses: actions/upload-artifact@v6
        with:
          name: ownloop-ol009-toolchain
          path: /tmp/ownloop-ol009-toolchain.tar.gz
          if-no-files-found: error

      - name: Remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/ol009-toolchain.yml
          git commit -m "Remove OL-009 toolchain workflow"
          git push origin "HEAD:${{ github.head_ref }}"
