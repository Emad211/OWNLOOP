name: Finalize OL-014 Verification Extraction

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-014-verification-extraction'
    runs-on: ubuntu-latest
    steps:
      - name: Check out OL-014 branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Verify and decode implementation patch
        shell: bash
        run: |
          set -euo pipefail
          expected_sizes=(8000 8000 8000 8000 6996)
          expected_hashes=(
            27ac6091153c5a66d9580b330328dae35d1419bc3ccd255f0f6f61f8d6bbbeb0
            6e5b484f1320d7267a65764a7ed5adb73e270a65b4d6e97538378722b9c1a84c
            df44afa74ce2ca5e986659ad2f93b6af4f68c3cd2e33df65723ac7c83d9ac6b8
            274750190f00ee7a9505d34114a0710d4f4936b28a1ea0ed527c9bd12c3736a1
            1de040c658fddf69c5954ec2307ff7c0dd852d24e26d8c2fc1eeb34580bb5444
          )
          for index in $(seq 0 4); do
            suffix=$(printf '%02d' "$index")
            path=".github/ol014-payload/part-${suffix}"
            test "$(wc -c < "$path")" -eq "${expected_sizes[$index]}"
            echo "${expected_hashes[$index]}  $path" | sha256sum --check
          done
          cat .github/ol014-payload/part-* > /tmp/ol014.patch.gz.b64
          test "$(wc -c < /tmp/ol014.patch.gz.b64)" -eq 38996
          base64 --decode /tmp/ol014.patch.gz.b64 > /tmp/ol014.patch.gz
          test "$(wc -c < /tmp/ol014.patch.gz)" -eq 29246
          echo "743a13e89096045d18bdeaab8d5d94b67495b4bede3af2ed464c1a1069f4b0a6  /tmp/ol014.patch.gz" | sha256sum --check
          gzip --test /tmp/ol014.patch.gz
          gzip --decompress --stdout /tmp/ol014.patch.gz > /tmp/ol014.patch
          test "$(wc -c < /tmp/ol014.patch)" -eq 147752
          echo "d6385b7bd81b4146e97d17d753ea12b99a7b660c45f74d98da8dc7a2825a42c6  /tmp/ol014.patch" | sha256sum --check
          git apply --check /tmp/ol014.patch

      - name: Apply patch and verify exact scope
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/ol014.patch
          git add -N .
          cat > /tmp/expected-files <<'FILES'
          .github/workflows/export-ol014-source.yml
          AGENTS.md
          README.md
          apps/daemon/src/index.ts
          apps/daemon/src/persistence/migration-definitions.ts
          apps/daemon/src/persistence/migrations.test.ts
          apps/daemon/src/persistence/repositories/events.ts
          apps/daemon/src/replay/projection.ts
          apps/daemon/src/verification-extraction/README.md
          apps/daemon/src/verification-extraction/artifact.test.ts
          apps/daemon/src/verification-extraction/artifact.ts
          apps/daemon/src/verification-extraction/constants.ts
          apps/daemon/src/verification-extraction/index.ts
          apps/daemon/src/verification-extraction/processor.test.ts
          apps/daemon/src/verification-extraction/processor.ts
          apps/daemon/src/verification-extraction/recognizer.test.ts
          apps/daemon/src/verification-extraction/recognizer.ts
          apps/daemon/src/verification-extraction/reducer.test.ts
          apps/daemon/src/verification-extraction/reducer.ts
          apps/daemon/src/verification-extraction/source.test.ts
          apps/daemon/src/verification-extraction/source.ts
          docs/adr/0016-deterministic-verification-evidence-extraction.md
          packages/contracts/src/index.ts
          packages/contracts/src/replay.ts
          packages/contracts/src/verification-evidence.ts
          packages/contracts/tests/verification-evidence.test.ts
          FILES
          git diff --name-only \
            | grep -v '^\.github/ol014-payload/' \
            | grep -v '^\.github/workflows/finalize-ol014.yml$' \
            | sort > /tmp/actual-files
          diff -u /tmp/expected-files /tmp/actual-files
          git rm -r .github/ol014-payload
          git rm .github/workflows/finalize-ol014.yml
          git diff --check

      - name: Set up exact Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Install frozen dependencies
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile

      - name: Validate OL-014 implementation
        shell: bash
        run: |
          set -euo pipefail
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish clean OL-014 commit
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement deterministic verification extraction"
          git push origin "HEAD:${{ github.head_ref }}"
