name: Finalize OL-011A Hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-011a-finalization-hardening'
    runs-on: ubuntu-latest
    steps:
      - name: Check out hardening branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Assemble and verify validated patch
        shell: bash
        run: |
          set -euo pipefail
          expected_sizes=(1800 1800 1800 1800 1800 312)
          expected_hashes=(
            c05c4f66569dcba7e2e86d450c1967f45d31f41ddae9b6a413ffd43de0f8f230
            fd967b425bf1d1fc7b56e866792090bdd4de1d79b9786afec729dc2a770ae5d4
            c00a7c75916bf70339fbd815664052d3bd4318ce61bf1651d37f71eb5ca80a5c
            d39af7112c239480ce6599b09d245a64c8f02b898bca108ad85e9d1cd625afce
            0f01485f07ab347f4bee96aab6106c12e9922962cbf860054cc7cb704940aa68
            37084531289754f80f512fdf70ea470e6ab5432cb150ba136d64a6f272a1e8bc
          )
          for index in $(seq 0 5); do
            suffix=$(printf '%02d' "$index")
            path=".github/ol011a-final-v2/part-${suffix}"
            test "$(wc -c < "$path")" -eq "${expected_sizes[$index]}"
            echo "${expected_hashes[$index]}  $path" | sha256sum --check
          done
          cat .github/ol011a-final-v2/part-* > /tmp/ol011a-final-v2.patch.gz.b64
          test "$(wc -c < /tmp/ol011a-final-v2.patch.gz.b64)" -eq 9312
          base64 --decode /tmp/ol011a-final-v2.patch.gz.b64 > /tmp/ol011a-final-v2.patch.gz
          test "$(wc -c < /tmp/ol011a-final-v2.patch.gz)" -eq 6983
          echo "a8bcc5629c37c6ae4baa731d896e0fa703ddefa0a857e41dc209b19720a68f3a  /tmp/ol011a-final-v2.patch.gz" | sha256sum --check
          gzip --test /tmp/ol011a-final-v2.patch.gz
          gzip --decompress --stdout /tmp/ol011a-final-v2.patch.gz > /tmp/ol011a-final-v2.patch
          test "$(wc -c < /tmp/ol011a-final-v2.patch)" -eq 30026
          echo "973b3fe3dfd2927def128c05fc2964e250f9e36e4d304dd1839ec21037a23be5  /tmp/ol011a-final-v2.patch" | sha256sum --check
          git apply --check /tmp/ol011a-final-v2.patch

      - name: Apply patch and verify exact scope
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/ol011a-final-v2.patch
          cat > /tmp/expected-production-files <<'FILES'
          apps/daemon/src/finalization/processor.test.ts
          apps/daemon/src/finalization/processor.ts
          apps/daemon/src/persistence/migration-definitions.ts
          apps/daemon/src/persistence/migrations.test.ts
          apps/daemon/src/persistence/repositories/run-finalizations.ts
          docs/adr/0013-deterministic-run-finalization-and-crash-recovery.md
          FILES
          git diff --name-only | grep -v '^\.github/' | sort > /tmp/actual-production-files
          diff -u /tmp/expected-production-files /tmp/actual-production-files
          git rm -r \
            .github/ol011a-hardening \
            .github/ol011a-hardening-gz \
            .github/ol011a-final-v2
          git rm \
            .github/workflows/finalize-ol011a-hardening.yml \
            .github/workflows/export-ol011a-source.yml

      - name: Set up exact Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Install frozen dependencies
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile

      - name: Validate hardened implementation
        shell: bash
        run: |
          set -euo pipefail
          pnpm format
          git diff --check
          cat > /tmp/expected-production-files <<'FILES'
          apps/daemon/src/finalization/processor.test.ts
          apps/daemon/src/finalization/processor.ts
          apps/daemon/src/persistence/migration-definitions.ts
          apps/daemon/src/persistence/migrations.test.ts
          apps/daemon/src/persistence/repositories/run-finalizations.ts
          docs/adr/0013-deterministic-run-finalization-and-crash-recovery.md
          FILES
          git diff --name-only | grep -v '^\.github/' | sort > /tmp/actual-production-files
          diff -u /tmp/expected-production-files /tmp/actual-production-files
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish clean OL-011A commit
        shell: bash
        run: |
          set -euo pipefail
          git add \
            apps/daemon/src/finalization/processor.test.ts \
            apps/daemon/src/finalization/processor.ts \
            apps/daemon/src/persistence/migration-definitions.ts \
            apps/daemon/src/persistence/migrations.test.ts \
            apps/daemon/src/persistence/repositories/run-finalizations.ts \
            docs/adr/0013-deterministic-run-finalization-and-crash-recovery.md
          git add -u .github
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Harden OL-011 finalization invariants"
          git push origin "HEAD:${{ github.head_ref }}"
