name: Finalize OL-011A Hardening

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-011a-finalization-hardening'
    runs-on: ubuntu-latest
    steps:
      - name: Check out hardening branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Verify compressed payload parts
        shell: bash
        run: |
          set -euo pipefail
          expected_sizes=(1800 1800 1800 1800 256)
          expected_hashes=(
            fd2fbc7a1369e859133301d7dfe0aaf14fac16a40f643c4797582074ca4361e4
            2c9e2a9ffa56762284a368ad73d377c9c2330757b0c190391f8fda657c1fa9d2
            aaaa70e41bb0f872cda2c5c45bddf2d4ce8efdd647f28c94f909515745262fe2
            31cb233937662d1a8c51e18a3831cfe8b6004c92f405316270ad1225b845022e
            d9d5a61ee2fce3231fa5e83bdf821b384034bafe4b4d4860fc58afe7f39e7a34
          )
          for index in $(seq 0 4); do
            suffix=$(printf '%02d' "$index")
            path=".github/ol011a-hardening-gz/part-${suffix}"
            test "$(wc -c < "$path")" -eq "${expected_sizes[$index]}"
            echo "${expected_hashes[$index]}  $path" | sha256sum --check
          done

      - name: Decode compressed payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/ol011a-hardening-gz/part-* > /tmp/ol011a-hardening.patch.gz.b64
          test "$(wc -c < /tmp/ol011a-hardening.patch.gz.b64)" -eq 7456
          base64 --decode /tmp/ol011a-hardening.patch.gz.b64 > /tmp/ol011a-hardening.patch.gz

      - name: Verify compressed archive
        shell: bash
        run: |
          set -euo pipefail
          test "$(wc -c < /tmp/ol011a-hardening.patch.gz)" -eq 5591
          echo "1ca129c1e8c7910f6e6fb42503dc67407f3d25626da6cc30a5a476c78e59c153  /tmp/ol011a-hardening.patch.gz" | sha256sum --check
          gzip --test /tmp/ol011a-hardening.patch.gz

      - name: Verify decoded patch
        shell: bash
        run: |
          set -euo pipefail
          gzip --decompress --stdout /tmp/ol011a-hardening.patch.gz > /tmp/ol011a-hardening.patch
          test "$(wc -c < /tmp/ol011a-hardening.patch)" -eq 22820
          echo "8b3b0dc3816c306fd58ead4ee0921545335526873107dbf2d07b34c92bd4d70e  /tmp/ol011a-hardening.patch" | sha256sum --check

      - name: Check patch applicability
        shell: bash
        run: |
          set -euo pipefail
          git apply --check /tmp/ol011a-hardening.patch

      - name: Apply patch and verify exact scope
        shell: bash
        run: |
          set -euo pipefail
          git apply /tmp/ol011a-hardening.patch
          cat > /tmp/expected-production-files <<'FILES'
          apps/daemon/src/finalization/processor.test.ts
          apps/daemon/src/finalization/processor.ts
          apps/daemon/src/persistence/migration-definitions.ts
          apps/daemon/src/persistence/repositories/run-finalizations.ts
          docs/adr/0013-deterministic-run-finalization-and-crash-recovery.md
          FILES
          git diff --name-only | grep -v '^\.github/' | sort > /tmp/actual-production-files
          diff -u /tmp/expected-production-files /tmp/actual-production-files
          git rm -r .github/ol011a-hardening .github/ol011a-hardening-gz
          git rm .github/workflows/finalize-ol011a-hardening.yml

      - name: Set up exact Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Install frozen dependencies
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile

      - name: Validate hardened implementation
        shell: bash
        run: |
          set -euo pipefail
          pnpm format
          git diff --check
          cat > /tmp/expected-production-files <<'FILES'
          apps/daemon/src/finalization/processor.test.ts
          apps/daemon/src/finalization/processor.ts
          apps/daemon/src/persistence/migration-definitions.ts
          apps/daemon/src/persistence/repositories/run-finalizations.ts
          docs/adr/0013-deterministic-run-finalization-and-crash-recovery.md
          FILES
          git diff --name-only | grep -v '^\.github/' | sort > /tmp/actual-production-files
          diff -u /tmp/expected-production-files /tmp/actual-production-files
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish clean OL-011A commit
        shell: bash
        run: |
          set -euo pipefail
          git add \
            apps/daemon/src/finalization/processor.test.ts \
            apps/daemon/src/finalization/processor.ts \
            apps/daemon/src/persistence/migration-definitions.ts \
            apps/daemon/src/persistence/repositories/run-finalizations.ts \
            docs/adr/0013-deterministic-run-finalization-and-crash-recovery.md
          git add -u .github
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Harden OL-011 finalization invariants"
          git push origin "HEAD:${{ github.head_ref }}"
