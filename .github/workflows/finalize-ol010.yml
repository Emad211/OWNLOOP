name: Finalize OL-010 Implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Assemble and verify implementation archive
        shell: bash
        run: |
          set -euo pipefail
          for index in 00 01 02 03 04 05 06 07; do
            test -s ".github/ol010-final/part-${index}"
          done
          cat .github/ol010-final/part-* > /tmp/ol010-final.tar.gz.b64
          test "$(wc -c < /tmp/ol010-final.tar.gz.b64)" -eq 42664
          echo "f4213c0db57961289f08abbcc1b35f20c095a63ea4e340f976d28616c59dbddb  /tmp/ol010-final.tar.gz.b64" | sha256sum --check
          base64 --decode /tmp/ol010-final.tar.gz.b64 > /tmp/ol010-final.tar.gz
          gzip --test /tmp/ol010-final.tar.gz
          test "$(wc -c < /tmp/ol010-final.tar.gz)" -eq 31996
          echo "4cbbbf77b6a2d4a59020a4244bebdf9fd97945776a675b70b4ce023bbdb47bf5  /tmp/ol010-final.tar.gz" | sha256sum --check

      - name: Verify archive allowlist
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected-files <<'FILES'
          AGENTS.md
          apps/daemon/src/artifact-store/README.md
          apps/daemon/src/artifact-store/constants.ts
          apps/daemon/src/artifact-store/errors.ts
          apps/daemon/src/artifact-store/index.ts
          apps/daemon/src/artifact-store/store.test.ts
          apps/daemon/src/artifact-store/store.ts
          apps/daemon/src/index.ts
          apps/daemon/src/persistence/index.ts
          apps/daemon/src/persistence/migration-definitions.ts
          apps/daemon/src/persistence/migrations.test.ts
          apps/daemon/src/persistence/repositories.test.ts
          apps/daemon/src/persistence/repositories/artifacts.ts
          docs/adr/0012-local-content-addressed-artifact-store.md
          FILES
          tar -tzf /tmp/ol010-final.tar.gz > /tmp/archive-files
          diff -u /tmp/expected-files /tmp/archive-files

      - name: Extract implementation
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf /tmp/ol010-final.tar.gz
          git diff --check

      - name: Set up exact Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.18.0

      - name: Enable Corepack and install frozen dependencies
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile

      - name: Validate implementation
        shell: bash
        run: |
          set -euo pipefail
          pnpm format:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Publish clean implementation tree
        shell: bash
        run: |
          set -euo pipefail
          git add \
            AGENTS.md \
            apps/daemon/src/artifact-store/README.md \
            apps/daemon/src/artifact-store/constants.ts \
            apps/daemon/src/artifact-store/errors.ts \
            apps/daemon/src/artifact-store/index.ts \
            apps/daemon/src/artifact-store/store.test.ts \
            apps/daemon/src/artifact-store/store.ts \
            apps/daemon/src/index.ts \
            apps/daemon/src/persistence/index.ts \
            apps/daemon/src/persistence/migration-definitions.ts \
            apps/daemon/src/persistence/migrations.test.ts \
            apps/daemon/src/persistence/repositories.test.ts \
            apps/daemon/src/persistence/repositories/artifacts.ts \
            docs/adr/0012-local-content-addressed-artifact-store.md
          git rm -r .github/ol010-final
          git rm .github/workflows/finalize-ol010.yml
          git diff --cached --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement OL-010 local content-addressed artifact store"
          git push origin "HEAD:${{ github.head_ref }}"
