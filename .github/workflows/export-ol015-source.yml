name: Export OL-015 Source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-015-evidence-graph'
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Build exact source archive
        shell: bash
        run: |
          set -euo pipefail
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude='*/node_modules' \
            --exclude=dist \
            --exclude='*/dist' \
            --exclude=.turbo \
            --exclude='*/.turbo' \
            -czf /tmp/ownloop-ol015-source.tar.gz .
          sha256sum /tmp/ownloop-ol015-source.tar.gz > /tmp/ownloop-ol015-source.sha256

      - name: Upload source
        uses: actions/upload-artifact@v6
        with:
          name: ownloop-ol015-source
          path: |
            /tmp/ownloop-ol015-source.tar.gz
            /tmp/ownloop-ol015-source.sha256
          if-no-files-found: error
          retention-days: 1
