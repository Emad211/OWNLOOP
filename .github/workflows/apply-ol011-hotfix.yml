name: Apply OL-011 Invariant Hotfix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Assemble and verify payload
        shell: bash
        run: |
          set -euo pipefail
          test -s .github/ol011-hotfix/part-00
          test -s .github/ol011-hotfix/part-01
          cat .github/ol011-hotfix/part-* > /tmp/ol011-hotfix.patch.gz.b64
          test "$(wc -c < /tmp/ol011-hotfix.patch.gz.b64)" -eq 5468
          echo "cec9dc75719c4f6e9b85cf2aabc77492885615153ae326aa2ba875ffed2647c3  /tmp/ol011-hotfix.patch.gz.b64" | sha256sum --check

      - name: Decode and verify patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode /tmp/ol011-hotfix.patch.gz.b64 > /tmp/ol011-hotfix.patch.gz
          gzip --test /tmp/ol011-hotfix.patch.gz
          gzip --decompress --stdout /tmp/ol011-hotfix.patch.gz > /tmp/ol011-hotfix.patch
          echo "5c1c8ecc72168b196a38098f268dc92e8711e9b42ace32193a72b549727acfff  /tmp/ol011-hotfix.patch" | sha256sum --check
          git apply --check --verbose /tmp/ol011-hotfix.patch

      - name: Apply and publish
        shell: bash
        run: |
          set -euo pipefail
          git apply --index /tmp/ol011-hotfix.patch
          git rm -r .github/ol011-hotfix
          git rm .github/workflows/apply-ol011-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Fix OL-011 finalization invariants"
          git push origin "HEAD:${{ github.head_ref }}"
