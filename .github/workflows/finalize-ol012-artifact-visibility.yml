name: Export OL-012 Artifact Review Files

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/ol-012-raw-replay'
    runs-on: ubuntu-latest
    steps:
      - name: Check out replay branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1

      - name: Package exact review files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ol012-review
          tar -czf /tmp/ol012-review/current-files.tar.gz \
            apps/daemon/src/persistence/repositories/artifacts.ts \
            apps/daemon/src/persistence/repositories/git-reconciliations.ts \
            apps/daemon/src/replay/projection.ts \
            apps/daemon/src/replay/routes.ts \
            apps/daemon/src/replay/replay.test.ts
          sha256sum /tmp/ol012-review/current-files.tar.gz > /tmp/ol012-review/current-files.sha256

      - name: Upload exact review files
        uses: actions/upload-artifact@v6
        with:
          name: ownloop-ol012-artifact-review-files
          path: /tmp/ol012-review
          compression-level: 0
          retention-days: 1
