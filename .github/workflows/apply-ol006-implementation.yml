name: Apply OL-006 Implementation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}

      - name: Verify chunks
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/expected <<'HASHES'
          e0374712eb45099af0b444722eb6a1e293b4c769 .github/ol006-parts/part-00
          fb727e57a521f7d1e771c8c0faa3da0fba84fa35 .github/ol006-parts/part-01
          2a4481ea4735ac250c71dfb785fd8d44c2c92097 .github/ol006-parts/part-02
          HASHES
          while read -r expected file; do
            test -s "$file"
            test "$(git hash-object "$file")" = "$expected"
          done < /tmp/expected

      - name: Assemble and verify patch
        shell: bash
        run: |
          set -euo pipefail
          cat .github/ol006-parts/part-* > /tmp/ol006.diff.gz.b64
          test "$(wc -c < /tmp/ol006.diff.gz.b64)" -eq 19736
          base64 --decode /tmp/ol006.diff.gz.b64 > /tmp/ol006.diff.gz
          gzip --test /tmp/ol006.diff.gz
          gzip --decompress --stdout /tmp/ol006.diff.gz > /tmp/ol006.diff
          echo "c75317bd3430ff0cea53d9e46dbb7f3b490285b76dbb8561944717200266b439  /tmp/ol006.diff" | sha256sum --check
          git apply --check --verbose /tmp/ol006.diff

      - name: Apply and publish
        shell: bash
        run: |
          set -euo pipefail
          git apply --index /tmp/ol006.diff
          git rm -r .github/ol006-parts
          git rm .github/workflows/apply-ol006-implementation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Implement OL-006 lifecycle resolution"
          git push origin "HEAD:${{ github.head_ref }}"
